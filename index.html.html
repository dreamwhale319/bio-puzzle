<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>바이오랩 탈출: 사라진 치료제 코드</title>
  <style>
    :root {
      --bg: #f8fbff;
      --bg-2: #fff7fb;
      --ink: #263241;
      --muted: #657489;
      --panel: #ffffff;
      --panel-2: #f8fcff;
      --line: #dbe8f4;
      --mint: #aeeadf;
      --mint-deep: #3f9d92;
      --sky: #b9ddff;
      --sky-deep: #4f8fd2;
      --pink: #ffd5e6;
      --pink-deep: #d56a91;
      --lavender: #ddd3ff;
      --yellow: #ffe8a6;
      --green: #cceec3;
      --red: #ef6a7a;
      --shadow: 0 18px 44px rgba(92, 114, 138, 0.18);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background:
        linear-gradient(135deg, rgba(185, 221, 255, 0.34) 0 18%, transparent 18% 100%),
        linear-gradient(225deg, rgba(255, 213, 230, 0.36) 0 20%, transparent 20% 100%),
        linear-gradient(180deg, #f8fbff 0%, #fff7fb 45%, #f6fff9 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(79, 143, 210, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 143, 210, 0.06) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.85), transparent 88%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px 14px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    input:focus {
      border-color: var(--sky-deep);
      box-shadow: 0 0 0 4px rgba(185, 221, 255, 0.45);
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 34px;
      position: relative;
    }

    header {
      display: grid;
      grid-template-columns: 1fr minmax(240px, 360px);
      gap: 18px;
      align-items: stretch;
      padding: 14px 0 18px;
    }

    .title-band {
      min-height: 210px;
      display: grid;
      align-content: center;
      gap: 12px;
      padding: 26px;
      border: 1px solid rgba(219, 232, 244, 0.92);
      border-radius: var(--radius);
      background:
        linear-gradient(120deg, rgba(255,255,255,0.88), rgba(255,247,251,0.88)),
        linear-gradient(135deg, rgba(174,234,223,0.42), rgba(185,221,255,0.44));
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .title-band::after {
      content: "";
      position: absolute;
      inset: auto -20px -28px auto;
      width: 260px;
      height: 120px;
      background: linear-gradient(90deg, transparent, rgba(174, 234, 223, 0.72), transparent);
      transform: rotate(-10deg);
      opacity: 0.78;
    }

    .eyebrow {
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--mint-deep);
      font-weight: 800;
      font-size: 0.82rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.9rem, 4vw, 3.4rem);
      line-height: 1.06;
      letter-spacing: 0;
      color: #273347;
    }

    .subtitle {
      max-width: 720px;
      margin: 0;
      color: #5a6d82;
      line-height: 1.55;
      font-size: clamp(0.98rem, 1.5vw, 1.14rem);
    }

    .lab-visual {
      min-height: 210px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(246,255,249,0.86));
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      padding: 16px;
      overflow: hidden;
    }

    .lab-visual svg {
      width: min(100%, 330px);
      height: auto;
      display: block;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 0 0 14px;
    }

    .stat {
      min-height: 72px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.88);
      box-shadow: 0 10px 28px rgba(92, 114, 138, 0.11);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-size: 1.22rem;
      color: #273347;
    }

    .progress-shell {
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      overflow: hidden;
      margin: 0 0 18px;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--mint), var(--sky), var(--pink));
      transition: width 0.35s ease;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 16px;
      align-items: start;
    }

    .game-panel,
    .side-panel,
    .result-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.92);
      box-shadow: var(--shadow);
    }

    .game-panel {
      padding: clamp(16px, 2.4vw, 26px);
      min-height: 600px;
    }

    .stage-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .stage-title {
      margin: 0;
      font-size: clamp(1.35rem, 2.4vw, 2rem);
      line-height: 1.2;
      color: #263241;
    }

    .pill {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      background: #f7fbff;
      border: 1px solid var(--line);
      color: var(--sky-deep);
      font-weight: 800;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .section {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      margin-top: 12px;
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #385064;
    }

    .section p,
    .section li {
      color: #3f4f60;
      line-height: 1.62;
    }

    .section p {
      margin: 0 0 9px;
    }

    .section p:last-child {
      margin-bottom: 0;
    }

    .options {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: #364656;
      cursor: pointer;
    }

    .option:hover {
      border-color: var(--sky);
      background: #fbfdff;
    }

    .option input {
      width: auto;
      margin-top: 3px;
      accent-color: var(--mint-deep);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: var(--radius);
      padding: 10px 14px;
      color: #243044;
      background: linear-gradient(180deg, #ffffff, #f4faff);
      border: 1px solid var(--line);
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(92, 114, 138, 0.12);
    }

    .btn.primary {
      color: #153b45;
      background: linear-gradient(180deg, #c8fff2, #aeeadf);
      border-color: #8bd7cb;
    }

    .btn.pink {
      color: #573044;
      background: linear-gradient(180deg, #ffeaf2, #ffd5e6);
      border-color: #f2b7ce;
    }

    .feedback {
      min-height: 24px;
      margin-top: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .feedback.good {
      color: #2c8b75;
    }

    .feedback.bad {
      color: var(--red);
    }

    .puzzle-card {
      display: none;
      animation: rise 0.3s ease both;
    }

    .puzzle-card.unlocked {
      display: block;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      margin: 10px 0;
    }

    table {
      width: 100%;
      min-width: 620px;
      border-collapse: collapse;
      font-size: 0.93rem;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f2fbff;
      color: #365266;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    code,
    .code {
      font-family: "Consolas", "SFMono-Regular", monospace;
      color: #23485a;
      background: #eef8ff;
      border: 1px solid #d2e8f7;
      border-radius: 6px;
      padding: 2px 5px;
    }

    .side-panel {
      padding: 14px;
      position: sticky;
      top: 12px;
    }

    .side-panel h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #385064;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 42px;
      padding: 10px;
      border: 1px dashed #b7d4e7;
      border-radius: var(--radius);
      background: #f8fcff;
    }

    .chip {
      min-width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      background: linear-gradient(180deg, #ffffff, #e9fff9);
      border: 1px solid #bee5dc;
      color: #2b6f65;
      font-weight: 900;
      animation: pop 0.28s ease both;
    }

    @keyframes pop {
      from {
        transform: scale(0.86);
        opacity: 0;
      }
    }

    .mini-list {
      margin: 12px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .mini-list li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eef3f8;
    }

    .message {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffdf5;
      color: #6a5530;
      line-height: 1.55;
    }

    .side-actions {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(38, 50, 65, 0.32);
      backdrop-filter: blur(5px);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(760px, 100%);
      max-height: min(82vh, 780px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 28px 70px rgba(38, 50, 65, 0.24);
      padding: 18px;
    }

    .modal h2 {
      margin: 0 0 10px;
    }

    .result-panel {
      padding: 24px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 16px 0;
    }

    .teacher-entry {
      margin-top: 18px;
      display: flex;
      justify-content: center;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 980px) {
      header,
      main {
        grid-template-columns: 1fr;
      }

      .hud {
        grid-template-columns: repeat(2, 1fr);
      }

      .side-panel {
        position: static;
      }
    }

    @media (max-width: 620px) {
      .app {
        width: min(100% - 18px, 1180px);
      }

      .title-band {
        min-height: auto;
        padding: 20px;
      }

      .hud,
      .result-grid {
        grid-template-columns: 1fr;
      }

      .stage-top {
        display: grid;
      }

      .pill {
        width: fit-content;
      }

      .btn {
        width: 100%;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      header,
      .hud,
      .progress-shell,
      .side-panel,
      .teacher-entry,
      .actions:not(.print-actions) {
        display: none !important;
      }

      main {
        display: block;
      }

      .result-panel,
      .game-panel {
        box-shadow: none;
        border: 1px solid #bbb;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <section class="title-band" aria-label="게임 소개">
        <div class="eyebrow">어려움 고정 · 60분 생명기술 방탈출</div>
        <h1>바이오랩 탈출:<br>사라진 치료제 코드</h1>
        <p class="subtitle">BLOOM LAB의 봉인을 풀기 위해 13개 보안 구역을 지나며 DNA, CRISPR, PCR, 백신, 오가노이드, 생명윤리 퍼즐을 해결하세요.</p>
      </section>
      <section class="lab-visual" aria-label="파스텔 바이오랩 장면">
        <svg viewBox="0 0 360 250" role="img" aria-label="파스텔 색감의 실험실 그림">
          <defs>
            <linearGradient id="tube" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0" stop-color="#ffffff"/>
              <stop offset="1" stop-color="#b9ddff"/>
            </linearGradient>
            <linearGradient id="liquid" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stop-color="#aeeadf"/>
              <stop offset="1" stop-color="#ffd5e6"/>
            </linearGradient>
          </defs>
          <rect x="24" y="168" width="312" height="30" rx="8" fill="#dbe8f4"/>
          <rect x="48" y="70" width="70" height="116" rx="8" fill="url(#tube)" stroke="#8bb8d9" stroke-width="3"/>
          <path d="M51 142 Q83 128 115 142 L115 177 Q83 190 51 177 Z" fill="url(#liquid)" opacity="0.88"/>
          <rect x="61" y="52" width="44" height="22" rx="8" fill="#fff" stroke="#8bb8d9" stroke-width="3"/>
          <path d="M169 46 C145 70 145 100 169 124 C193 148 193 178 169 203" fill="none" stroke="#4f8fd2" stroke-width="7" stroke-linecap="round"/>
          <path d="M212 46 C236 70 236 100 212 124 C188 148 188 178 212 203" fill="none" stroke="#3f9d92" stroke-width="7" stroke-linecap="round"/>
          <g stroke="#9fb6cc" stroke-width="3">
            <line x1="170" y1="64" x2="211" y2="64"/>
            <line x1="157" y1="91" x2="224" y2="91"/>
            <line x1="166" y1="120" x2="215" y2="120"/>
            <line x1="157" y1="151" x2="224" y2="151"/>
            <line x1="170" y1="181" x2="211" y2="181"/>
          </g>
          <rect x="258" y="84" width="54" height="76" rx="8" fill="#fff7fb" stroke="#d56a91" stroke-width="3"/>
          <rect x="268" y="104" width="34" height="44" rx="8" fill="#ffd5e6"/>
          <path d="M271 84 V68 C271 54 299 54 299 68 V84" fill="none" stroke="#d56a91" stroke-width="7" stroke-linecap="round"/>
          <g fill="#ffe8a6" stroke="#cda94c" stroke-width="2">
            <circle cx="48" cy="213" r="8"/>
            <circle cx="78" cy="222" r="5"/>
            <circle cx="318" cy="218" r="7"/>
          </g>
        </svg>
      </section>
    </header>

    <section class="hud" aria-label="진행 상태">
      <div class="stat"><span>현재 단계</span><strong id="stageStat">1/13</strong></div>
      <div class="stat"><span>점수</span><strong id="scoreStat">120</strong></div>
      <div class="stat"><span>남은 시간</span><strong id="timeStat">60:00</strong></div>
      <div class="stat"><span>오답</span><strong id="wrongStat">0</strong></div>
    </section>
    <div class="progress-shell" aria-label="진행률"><div class="progress-fill" id="progressFill"></div></div>

    <main>
      <section class="game-panel" id="gamePanel"></section>
      <aside class="side-panel">
        <h2>획득한 코드 조각</h2>
        <div class="chips" id="codeChips" aria-live="polite"></div>
        <ul class="mini-list">
          <li><span>난이도</span><strong>어려움</strong></li>
          <li><span>오답 감점</span><strong>퀴즈 -2 / 퍼즐 -5</strong></li>
          <li><span>최종 코드</span><strong>13단계에서 입력</strong></li>
        </ul>
        <div class="message" style="margin-top:12px;">어려움 모드입니다. 답은 공백, 하이픈, 쉼표를 빼고 비교됩니다.</div>
        <div class="side-actions">
          <button class="btn" id="sideRestartBtn" type="button">처음부터 다시 시작</button>
          <div class="message">진행 상황은 이 브라우저에 자동 저장됩니다.</div>
        </div>
      </aside>
    </main>

    <div class="teacher-entry">
      <button class="btn" id="teacherBtn" type="button">교사용</button>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const TOTAL_SECONDS = 60 * 60;
    const SAVE_KEY = "bioEscapeLabHardPastel";
    const FINAL_CODE = "BIOTECH2026X";

    const stages = [
      {
        title: "DNA 서열 복구실",
        topic: "DNA 염기쌍",
        code: "B",
        description: [
          "DNA는 생명체의 유전 정보를 저장하는 물질이다.",
          "DNA는 A, T, G, C라는 네 가지 염기로 이루어져 있다.",
          "DNA의 두 가닥은 서로 짝을 이루는데, A는 T와 짝을 이루고 G는 C와 짝을 이룬다.",
          "이 규칙을 상보적 염기쌍이라고 한다. 손상된 DNA 정보를 복구할 때도 이 짝 규칙을 이용할 수 있다."
        ],
        quiz: {
          question: "다음 중 DNA의 상보적 염기쌍으로 옳은 것은?",
          options: ["A-G, T-C", "A-T, G-C", "A-C, G-T", "A-A, T-T"],
          answer: "2"
        },
        puzzle: `
          <p>아래 DNA 원본 가닥에 맞는 상보 가닥을 완성하라.</p>
          <p>원본 가닥: <span class="code">A T G C C A T G A C C T</span></p>
          <p>손상된 상보 가닥: <span class="code">T ? C G ? T A ? T G ? A</span></p>
          <p>빈칸을 포함한 전체 상보 가닥을 입력하라.</p>
        `,
        answer: "TACGGTACTGGA"
      },
      {
        title: "CRISPR 유전자 가위 표적실",
        topic: "CRISPR 유전자 가위",
        code: "I",
        description: [
          "CRISPR 유전자 가위는 DNA의 특정 위치를 찾아 잘라내거나 수정할 수 있는 생명기술이다.",
          "이 기술은 목표 서열을 정확히 찾는 것이 중요하다. 잘못된 위치를 자르면 원하지 않는 유전자 변화가 생길 수 있다.",
          "수업용 게임에서는 목표 서열과 보조 조건을 모두 만족하는 위치를 찾는 방식으로 단순화한다."
        ],

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, Math.floor(number)));
    }

    function sanitizeStageMap(value) {
      const source = value && typeof value === "object" ? value : {};
      const clean = {};
      for (let index = 0; index < stages.length; index += 1) {
        if (source[index]) clean[index] = true;
      }
      return clean;
    }

    function sanitizeState(saved) {
      const clean = Object.assign(defaultState(), saved || {});
      clean.stageIndex = clampNumber(clean.stageIndex, 0, stages.length - 1, 0);
      clean.score = clampNumber(clean.score, 0, 120, 120);
      clean.wrongs = clampNumber(clean.wrongs, 0, 999, 0);
      clean.elapsed = clampNumber(clean.elapsed, 0, TOTAL_SECONDS, 0);
      clean.quizUnlocked = sanitizeStageMap(clean.quizUnlocked);
      clean.solved = sanitizeStageMap(clean.solved);
      Object.keys(clean.solved).forEach((index) => {
        clean.quizUnlocked[index] = true;
      });
      clean.codes = [];
      clean.finished = Boolean(clean.finished) && Boolean(clean.solved[stages.length - 1]);
      clean.finalGrade = clean.finished ? (clean.finalGrade || grade(clean.score)) : "";
      return clean;

        localStorage.removeItem(SAVE_KEY);
      }
      return defaultState();

        .toUpperCase()
        .replace(/[\s,\-]/g, "");
    }

      const m = String(Math.floor(remaining / 60)).padStart(2, "0");
      const s = String(remaining % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function formatUsedTime(seconds) {
      const used = Math.max(0, seconds);
      const m = String(Math.floor(used / 60)).padStart(2, "0");
      const s = String(used % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

        </ul>
        <div class="actions">
          <button class="btn" id="teacherPrint" type="button">정답표 인쇄</button>
          <button class="btn primary" id="modalClose" type="button">닫기</button>
        </div>
      `;
      document.getElementById("teacherPrint").addEventListener("click", () => window.print());
      document.getElementById("modalClose").addEventListener("click", closeModal);
    }

    function startTimer() {
      clearInterval(timerId);
      timerId = setInterval(() => {
        if (state.finished) return;
        state.elapsed = Math.min(TOTAL_SECONDS, state.elapsed + 1);
        document.getElementById("timeStat").textContent = formatTime(state.elapsed);
        if (state.elapsed % 10 === 0) saveState();
      }, 1000);
    }

    modalBackdrop.addEventListener("click", (event) => {
      if (event.target === modalBackdrop) closeModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });
    document.getElementById("teacherBtn").addEventListener("click", showTeacherGate);
    document.getElementById("sideRestartBtn").addEventListener("click", restart);

    render();
    startTimer();
  </script>
</body>
</html>
